<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="appGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4da6ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with subtle gradient -->
  <rect width="180" height="180" rx="36" fill="#0e0e12"/>

  <!-- Main icon group -->
  <g transform="translate(30, 30)" filter="url(#softGlow)">
    <!-- Left pillar -->
    <path d="M20 100 L20 30 Q20 20 30 20 L40 20 L40 100 Q40 108 35 108 L25 108 Q20 108 20 100Z"
          fill="url(#appGrad)"/>

    <!-- Center V shape -->
    <path d="M40 32 L60 65 L80 32 L80 42 L60 80 L40 42Z"
          fill="url(#appGrad)"/>

    <!-- Right pillar -->
    <path d="M80 20 L90 20 Q100 20 100 30 L100 100 Q100 108 95 108 L85 108 Q80 108 80 100 L80 20Z"
          fill="url(#appGrad)"/>

    <!-- Neural dots -->
    <circle cx="30" cy="12" r="5" fill="#4da6ff" opacity="0.85"/>
    <circle cx="60" cy="8" r="4" fill="#7c3aed" opacity="0.75"/>
    <circle cx="90" cy="12" r="5" fill="#4da6ff" opacity="0.85"/>

    <!-- Connecting arc -->
    <path d="M30 12 Q60 -2 90 12" fill="none" stroke="url(#appGrad)" stroke-width="1.5" opacity="0.5"/>
  </g>
</svg>
