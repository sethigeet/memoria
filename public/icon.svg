<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Primary gradient using the accent blue -->
    <linearGradient id="memGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4da6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>

    <!-- Subtle glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background circle -->
  <circle cx="256" cy="256" r="240" fill="#0e0e12"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#1a1a1f" stroke-width="2"/>

  <!-- Stylized book/memory shape - layered pages forming an 'M' -->
  <g filter="url(#glow)">
    <!-- Left page/pillar -->
    <path d="M140 340 L140 172 Q140 140 172 140 L200 140 L200 340 Q200 360 180 360 L160 360 Q140 360 140 340Z"
          fill="url(#memGrad)" opacity="0.9"/>

    <!-- Center valley (the memory spark) -->
    <path d="M200 180 L256 260 L312 180 L312 200 L256 290 L200 200Z"
          fill="url(#memGrad)" opacity="1"/>

    <!-- Right page/pillar -->
    <path d="M312 140 L340 140 Q372 140 372 172 L372 340 Q372 360 352 360 L332 360 Q312 360 312 340 L312 140Z"
          fill="url(#memGrad)" opacity="0.9"/>

    <!-- Neural connection dots - representing AI/memory -->
    <circle cx="170" cy="120" r="8" fill="#4da6ff" opacity="0.7"/>
    <circle cx="256" cy="100" r="6" fill="#7c3aed" opacity="0.6"/>
    <circle cx="342" cy="120" r="8" fill="#4da6ff" opacity="0.7"/>

    <!-- Connecting lines (subtle neural network hint) -->
    <path d="M170 120 Q213 90 256 100 Q299 90 342 120"
          fill="none" stroke="url(#memGrad)" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- Sparkle/knowledge accent -->
  <g opacity="0.8">
    <path d="M256 380 L260 395 L275 395 L263 405 L268 420 L256 412 L244 420 L249 405 L237 395 L252 395Z"
          fill="#4da6ff"/>
  </g>
</svg>
